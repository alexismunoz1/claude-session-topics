name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # Test before releasing
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run all tests
      run: |
        npm test
        npm run lint

  # Publish to npm
  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Sync versions
      run: npm run version:sync
    
    - name: Publish to npm
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          *.tgz
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Update CHANGELOG (optional)
  update-changelog:
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Update CHANGELOG
      run: |
        # Extract version from tag
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "Updating CHANGELOG for version $VERSION"
        
        # Create changelog entry (you can customize this)
        echo "## [$VERSION] - $(date +%Y-%m-%d)" > /tmp/changelog_entry
        echo "" >> /tmp/changelog_entry
        git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> /tmp/changelog_entry
        echo "" >> /tmp/changelog_entry
        
        # Prepend to CHANGELOG if it exists, otherwise create it
        if [ -f CHANGELOG.md ]; then
          cat /tmp/changelog_entry CHANGELOG.md > /tmp/CHANGELOG.md
          mv /tmp/CHANGELOG.md CHANGELOG.md
        else
          cat /tmp/changelog_entry > CHANGELOG.md
        fi
        
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add CHANGELOG.md
        git commit -m "chore: update CHANGELOG for v$VERSION" || true
        git push || true
